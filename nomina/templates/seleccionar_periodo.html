{% extends 'base.html' %}
{% block title %}Seleccionar Periodo{% endblock %}

{% load meses %}

{% block content %}
<h2>Seleccione un periodo para generar el {{ tipo|title }}</h2>
<form method="POST">
  {% csrf_token %}
  {% if tipo == 'constancia' %}
    <select name="periodo_seleccionado" required>
      <option value="">Seleccione...</option>
      {% for q in quincenas %}
        <option value="{{ q.mes }}-{{ q.ano }}">
          {{ q.mes|nombre_mes }} de {{ q.ano }}
        </option>
      {% endfor %}
    </select>
  {% else %}
    <select name="quincena_id" required>
      <option value="">Seleccione...</option>
      {% for q in quincenas %}
        <option value="{{ q.id }}">
          {% if q.periodo == 1 %}1era{% else %}2da{% endif %} Quincena de {{ q.mes|nombre_mes }} de {{ q.ano }}
        </option>
      {% endfor %}
    </select>
  {% endif %}
  <button type="submit">Generar PDF</button>
</form>
{% endblock %}
