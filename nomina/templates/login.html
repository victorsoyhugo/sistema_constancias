{% extends 'base.html' %}
{% block title %}Acceso Administrador{% endblock %}

{% block content %}
<h2>Panel Administrativo - Iniciar Sesión</h2>
<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Entrar</button>
</form>
{% for message in messages %}
  <div class="message error">{{ message }}</div>
{% endfor %}
{% endblock %}
